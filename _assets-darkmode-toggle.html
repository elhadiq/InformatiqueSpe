<!-- ===== Bouton mode sombre / clair (auto-contenu) — ne pas dupliquer ===== -->
<style id="cm-theme-style">
  .cm-darkmode{filter:invert(1) hue-rotate(180deg);background:#ededed !important;border-radius:12px;padding:4px 2px;}
  .cm-darkmode img,.cm-darkmode svg,.cm-darkmode video,.cm-darkmode iframe{filter:invert(1) hue-rotate(180deg);}
  #cm-theme-btn{position:fixed;top:14px;right:14px;z-index:99999;display:inline-flex;align-items:center;gap:7px;
    font-family:Arial,Helvetica,sans-serif;font-size:0.9em;font-weight:600;cursor:pointer;
    background:#026573;color:#ffffff;border:none;border-radius:22px;padding:8px 15px;
    box-shadow:0 2px 8px rgba(0,0,0,0.28);transition:background .2s,transform .1s;}
  #cm-theme-btn:hover{background:#02525d;}
  #cm-theme-btn:active{transform:scale(0.96);}
</style>
<button id="cm-theme-btn" type="button" aria-label="Basculer mode sombre / clair">
  <span id="cm-theme-ico">🌙</span><span id="cm-theme-lbl">Mode sombre</span>
</button>
<script>
(function(){
  var BG='#121212';
  function init(){
    var btn=document.getElementById('cm-theme-btn');
    if(!btn) return;
    var R=null, els=document.querySelectorAll('div[style*="margin:0 auto"]');
    for(var i=0;i<els.length;i++){ if(els[i]!==btn){ R=els[i]; break; } }
    if(!R) R=document.body;
    var prevH='', prevB='', saved=false;
    function apply(d){
      if(d){
        if(!saved){prevH=document.documentElement.style.background;prevB=document.body.style.background;saved=true;}
        document.documentElement.style.background=BG;
        document.body.style.background=BG;
        R.classList.add('cm-darkmode');
        document.getElementById('cm-theme-ico').textContent='☀️';
        document.getElementById('cm-theme-lbl').textContent='Mode clair';
      }else{
        document.documentElement.style.background=prevH;
        document.body.style.background=prevB;
        R.classList.remove('cm-darkmode');
        document.getElementById('cm-theme-ico').textContent='🌙';
        document.getElementById('cm-theme-lbl').textContent='Mode sombre';
      }
    }
    var dark=false; try{dark=localStorage.getItem('cmTheme')==='dark';}catch(e){}
    apply(dark);
    btn.addEventListener('click',function(){
      dark=!dark; apply(dark);
      try{localStorage.setItem('cmTheme',dark?'dark':'light');}catch(e){}
    });
  }
  if(document.readyState!=='loading') init();
  else document.addEventListener('DOMContentLoaded',init);
})();
</script>
<!-- ===== fin bouton mode sombre / clair ===== -->
