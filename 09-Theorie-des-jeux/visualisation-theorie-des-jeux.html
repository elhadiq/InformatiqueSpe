<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Théorie des jeux — visualisation pas à pas</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--teal:#026573;--dark:#2c3e50;--bg:#eef1f5;--border:#dce3ea;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--dark);padding:1.2rem 1.4rem 6rem;}
.wrap{max-width:1100px;margin:0 auto;}
.sbs-head{text-align:center;margin-bottom:.5rem;}.sbs-head h1{font-size:1.5rem;color:var(--teal);}.sbs-head .sub{color:#777;font-size:.9rem;margin-top:.2rem;}
.sbs-bar{display:flex;gap:.5rem;align-items:center;justify-content:center;margin:.4rem 0 .9rem;}
.sbs-bar select{padding:.45rem .7rem;border:1px solid var(--border);border-radius:6px;font-size:1rem;background:#fff;color:var(--dark);font-weight:600;}
.sbs-title{font-size:1.2rem;color:var(--teal);font-weight:700;text-align:center;}.sbs-count{font-size:.85rem;color:#999;margin:.1rem 0 .5rem;text-align:center;}
#stagewrap{width:100%;overflow:auto;border:1px solid #e2e9ef;border-radius:10px;background:#fbfdff;box-shadow:inset 0 0 0 1px #fff,0 2px 10px rgba(0,0,0,.05);max-height:72vh;text-align:center;}
#stage{display:block;margin:0 auto;}
.legend{display:flex;flex-wrap:wrap;gap:.6rem;margin:.7rem 0;font-size:.78rem;color:#555;justify-content:center;}
.legend span{display:inline-flex;align-items:center;gap:.3rem;}.legend i{width:15px;height:15px;border-radius:3px;display:inline-block;border:1px solid #bbb;}
.sbs-cap{background:#e4f1f2;border-left:5px solid var(--teal);border-radius:6px;padding:.65rem .9rem;font-size:1rem;color:#0a3a40;min-height:2.4rem;}
.sbs-panel{margin-top:.7rem;background:#f4f9fc;border:1px solid var(--border);border-radius:8px;padding:.7rem .9rem;font-size:.92rem;}
.prow{display:flex;gap:.5rem;padding:.2rem 0;border-bottom:1px dashed #e3eaf0;}.prow:last-child{border-bottom:none;}
.plab{font-weight:700;color:var(--teal);min-width:110px;}.pval{font-family:'Consolas','Fira Code',monospace;color:#1f4e7a;word-break:break-word;}
.sbs-ctrl{position:fixed;bottom:0;left:0;right:0;background:#ffffffee;border-top:1px solid var(--border);backdrop-filter:blur(4px);display:flex;gap:.6rem;align-items:center;justify-content:center;padding:.7rem;z-index:50;}
.sbs-ctrl button{background:var(--teal);color:#fff;border:none;border-radius:8px;padding:.55rem 1.1rem;font-weight:700;cursor:pointer;}
.sbs-ctrl button.ghost{background:#fff;color:var(--dark);border:1px solid var(--border);}.sbs-ctrl .pos{font-size:.85rem;color:#666;min-width:90px;text-align:center;}
</style></head><body><div class="wrap">
<div class="sbs-head"><h1>Théorie des jeux — visualisation pas à pas</h1>
<p style="text-align:center;color:#026573;font-weight:600;font-size:0.95em;margin:6px 0 14px;">Pr. EL Hadiq Zouhair</p><p class="sub">Suivant &#9654; / &#8594; déroule l'exécution &middot; <strong>Fin</strong> affiche l'état final &middot; zone défilable.</p></div>
<div class="sbs-bar"><label style="font-size:.9rem;color:#555;">Algorithme :</label><select id="algoSel"></select></div>
<div class="sbs-title" id="scTitle"></div><div class="sbs-count" id="scCount"></div>
<div id="stagewrap"><svg id="stage" xmlns="http://www.w3.org/2000/svg"></svg></div>
<div class="legend" id="legend"></div>
<div class="sbs-cap" id="cap"></div><div class="sbs-panel" id="panel"></div></div>
<div class="sbs-ctrl">
  <button class="ghost" id="bPrevAlgo">&#9198;</button><button class="ghost" id="bPrev">&#9664; Précédent</button>
  <button id="bNext">Suivant &#9654;</button><button class="ghost" id="bAll">&#10530; Fin</button>
  <button class="ghost" id="bReset">&#8635; Début</button><button class="ghost" id="bNextAlgo">&#9197;</button>
  <span class="pos" id="pos"></span></div>
<script>
const SCENES=[{"name": "Calcul de l'attracteur", "title": "Attracteur Attr₀(F) — induction arrière", "mode": "graph", "nodes": {"t": {"x": 300, "y": 55, "owner": "0", "label": "t"}, "a": {"x": 180, "y": 160, "owner": "0", "label": "a"}, "b": {"x": 420, "y": 160, "owner": "0", "label": "b"}, "p": {"x": 300, "y": 265, "owner": "1", "label": "p"}, "q": {"x": 110, "y": 265, "owner": "1", "label": "q"}, "x": {"x": 490, "y": 265, "owner": "0", "label": "x"}}, "edges": [["a", "t"], ["b", "t"], ["p", "a"], ["p", "b"], ["q", "a"], ["q", "x"], ["x", "q"]], "W": 600, "H": 330, "steps": [{"colors": {"t": "#e67e22", "a": "#cfe3ee", "b": "#cfe3ee", "p": "#cfe3ee", "q": "#cfe3ee", "x": "#cfe3ee"}, "hi": "t", "p": "<div class='prow'><span class='plab'>Attracteur</span><span class='pval'>{t}</span></div><div class='prow'><span class='plab'>rang</span><span class='pval'>t:0</span></div><div class='prow'><span class='plab'>File</span><span class='pval'>[t]</span></div>", "cap": "Initialisation : Attr⁰ = F = {t}. La cible est gagnante (rang 0)."}, {"colors": {"t": "#27ae60", "a": "#e67e22", "b": "#cfe3ee", "p": "#cfe3ee", "q": "#cfe3ee", "x": "#cfe3ee"}, "hi": "a", "p": "<div class='prow'><span class='plab'>Attracteur</span><span class='pval'>{a, t}</span></div><div class='prow'><span class='plab'>rang</span><span class='pval'>t:0, a:1</span></div><div class='prow'><span class='plab'>File</span><span class='pval'>[a]</span></div>", "cap": "a ∈ V₀ (Joueur 0) : il existe l'arc a→t avec t gagnant ⟹ a entre dans l'attracteur (rang 1)."}, {"colors": {"t": "#27ae60", "a": "#457b9d", "b": "#e67e22", "p": "#cfe3ee", "q": "#cfe3ee", "x": "#cfe3ee"}, "hi": "b", "p": "<div class='prow'><span class='plab'>Attracteur</span><span class='pval'>{a, b, t}</span></div><div class='prow'><span class='plab'>rang</span><span class='pval'>t:0, a:1, b:1</span></div><div class='prow'><span class='plab'>File</span><span class='pval'>[a, b]</span></div>", "cap": "b ∈ V₀ (Joueur 0) : il existe l'arc b→t avec t gagnant ⟹ b entre dans l'attracteur (rang 1)."}, {"colors": {"t": "#27ae60", "a": "#457b9d", "b": "#457b9d", "p": "#cfe3ee", "q": "#cfe3ee", "x": "#cfe3ee"}, "hi": "p", "p": "<div class='prow'><span class='plab'>Attracteur</span><span class='pval'>{a, b, t}</span></div><div class='prow'><span class='plab'>rang</span><span class='pval'>t:0, a:1, b:1</span></div><div class='prow'><span class='plab'>File</span><span class='pval'>[b]</span></div>", "cap": "p ∈ V₁ : arc p→a validé, mais il reste 1 successeur(s) hors attracteur ⟹ on attend."}, {"colors": {"t": "#27ae60", "a": "#457b9d", "b": "#457b9d", "p": "#cfe3ee", "q": "#cfe3ee", "x": "#cfe3ee"}, "hi": "q", "p": "<div class='prow'><span class='plab'>Attracteur</span><span class='pval'>{a, b, t}</span></div><div class='prow'><span class='plab'>rang</span><span class='pval'>t:0, a:1, b:1</span></div><div class='prow'><span class='plab'>File</span><span class='pval'>[b]</span></div>", "cap": "q ∈ V₁ : arc q→a validé, mais il reste 1 successeur(s) hors attracteur ⟹ on attend."}, {"colors": {"t": "#27ae60", "a": "#457b9d", "b": "#457b9d", "p": "#e67e22", "q": "#cfe3ee", "x": "#cfe3ee"}, "hi": "p", "p": "<div class='prow'><span class='plab'>Attracteur</span><span class='pval'>{a, b, p, t}</span></div><div class='prow'><span class='plab'>rang</span><span class='pval'>t:0, a:1, b:1, p:2</span></div><div class='prow'><span class='plab'>File</span><span class='pval'>[p]</span></div>", "cap": "p ∈ V₁ (Joueur 1) : TOUS ses successeurs sont gagnants ⟹ p entre dans l'attracteur (rang 2)."}, {"colors": {"t": "#27ae60", "a": "#457b9d", "b": "#457b9d", "p": "#457b9d", "q": "#c0392b", "x": "#c0392b"}, "hi": null, "p": "<div class='prow'><span class='plab'>Attracteur</span><span class='pval'>{a, b, p, t}</span></div><div class='prow'><span class='plab'>rang</span><span class='pval'>t:0, a:1, b:1, p:2</span></div><div class='prow'><span class='plab'>File</span><span class='pval'>[]</span></div>", "cap": "Stabilisation. Attr₀(F) = {a, b, p, t} (gagnantes Joueur 0). Positions q, x : gagnantes pour le Joueur 1 (en rouge)."}]}, {"name": "Algorithme Minimax", "title": "Minimax — remontée des valeurs", "mode": "tree", "nodes": {"r": {"x": 300, "y": 45, "kind": "max"}, "n1": {"x": 160, "y": 150, "kind": "min"}, "n2": {"x": 440, "y": 150, "kind": "min"}, "l1": {"x": 90, "y": 255, "kind": "leaf", "val": 3}, "l2": {"x": 230, "y": 255, "kind": "leaf", "val": 5}, "l3": {"x": 370, "y": 255, "kind": "leaf", "val": 2}, "l4": {"x": 510, "y": 255, "kind": "leaf", "val": 9}}, "edges": [["r", "n1"], ["r", "n2"], ["n1", "l1"], ["n1", "l2"], ["n2", "l3"], ["n2", "l4"]], "W": 600, "H": 300, "steps": [{"colors": {"r": "#cfe3ee", "n1": "#cfe3ee", "n2": "#cfe3ee", "l1": "#cfe3ee", "l2": "#cfe3ee", "l3": "#cfe3ee", "l4": "#cfe3ee"}, "hi": "r", "labels": {}, "p": "<div class='prow'><span class='plab'>Valeurs</span><span class='pval'>—</span></div>", "cap": "Arbre de jeu. MAX (cercle) maximise, MIN (carré) minimise. On évalue en profondeur."}, {"colors": {"r": "#cfe3ee", "n1": "#cfe3ee", "n2": "#cfe3ee", "l1": "#e67e22", "l2": "#cfe3ee", "l3": "#cfe3ee", "l4": "#cfe3ee"}, "hi": "l1", "labels": {"l1": 3}, "p": "<div class='prow'><span class='plab'>Valeurs</span><span class='pval'>l1=3</span></div>", "cap": "Feuille l1 : valeur heuristique = 3."}, {"colors": {"r": "#cfe3ee", "n1": "#cfe3ee", "n2": "#cfe3ee", "l1": "#457b9d", "l2": "#e67e22", "l3": "#cfe3ee", "l4": "#cfe3ee"}, "hi": "l2", "labels": {"l1": 3, "l2": 5}, "p": "<div class='prow'><span class='plab'>Valeurs</span><span class='pval'>l1=3, l2=5</span></div>", "cap": "Feuille l2 : valeur heuristique = 5."}, {"colors": {"r": "#cfe3ee", "n1": "#e67e22", "n2": "#cfe3ee", "l1": "#457b9d", "l2": "#457b9d", "l3": "#cfe3ee", "l4": "#cfe3ee"}, "hi": "n1", "labels": {"l1": 3, "l2": 5, "n1": 3}, "p": "<div class='prow'><span class='plab'>Valeurs</span><span class='pval'>l1=3, l2=5, n1=3</span></div>", "cap": "Nœud MIN n1 : min(3, 5) = 3 (l'adversaire choisit le pire pour MAX)."}, {"colors": {"r": "#cfe3ee", "n1": "#457b9d", "n2": "#cfe3ee", "l1": "#457b9d", "l2": "#457b9d", "l3": "#e67e22", "l4": "#cfe3ee"}, "hi": "l3", "labels": {"l1": 3, "l2": 5, "n1": 3, "l3": 2}, "p": "<div class='prow'><span class='plab'>Valeurs</span><span class='pval'>l1=3, l2=5, n1=3, l3=2</span></div>", "cap": "Feuille l3 : valeur heuristique = 2."}, {"colors": {"r": "#cfe3ee", "n1": "#457b9d", "n2": "#cfe3ee", "l1": "#457b9d", "l2": "#457b9d", "l3": "#457b9d", "l4": "#e67e22"}, "hi": "l4", "labels": {"l1": 3, "l2": 5, "n1": 3, "l3": 2, "l4": 9}, "p": "<div class='prow'><span class='plab'>Valeurs</span><span class='pval'>l1=3, l2=5, n1=3, l3=2, l4=9</span></div>", "cap": "Feuille l4 : valeur heuristique = 9."}, {"colors": {"r": "#cfe3ee", "n1": "#457b9d", "n2": "#e67e22", "l1": "#457b9d", "l2": "#457b9d", "l3": "#457b9d", "l4": "#457b9d"}, "hi": "n2", "labels": {"l1": 3, "l2": 5, "n1": 3, "l3": 2, "l4": 9, "n2": 2}, "p": "<div class='prow'><span class='plab'>Valeurs</span><span class='pval'>l1=3, l2=5, n1=3, l3=2, l4=9, n2=2</span></div>", "cap": "Nœud MIN n2 : min(2, 9) = 2 (l'adversaire choisit le pire pour MAX)."}, {"colors": {"r": "#e67e22", "n1": "#457b9d", "n2": "#457b9d", "l1": "#457b9d", "l2": "#457b9d", "l3": "#457b9d", "l4": "#457b9d"}, "hi": "r", "labels": {"l1": 3, "l2": 5, "n1": 3, "l3": 2, "l4": 9, "n2": 2, "r": 3}, "p": "<div class='prow'><span class='plab'>Valeurs</span><span class='pval'>l1=3, l2=5, n1=3, l3=2, l4=9, n2=2, r=3</span></div>", "cap": "Racine MAX : max(3, 2) = 3 ⟹ MAX joue vers le nœud de valeur 3."}]}];const NS="http://www.w3.org/2000/svg";
let flat=[];SCENES.forEach((s,si)=>s.steps.forEach((_,ti)=>flat.push([si,ti])));
let sceneStart={},sceneEnd={};flat.forEach(([si],g)=>{if(sceneStart[si]===undefined)sceneStart[si]=g;sceneEnd[si]=g;});
let gi=0;const stage=document.getElementById('stage');
function dark(h){const c=h.replace('#','');const r=parseInt(c.substr(0,2),16),g=parseInt(c.substr(2,2),16),b=parseInt(c.substr(4,2),16);return (0.299*r+0.587*g+0.114*b)<140;}
function el(t,a,x){const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);if(x!=null)e.textContent=x;return e;}
function clear(){while(stage.firstChild)stage.removeChild(stage.firstChild);}
function setSize(W,H){stage.setAttribute('viewBox','0 0 '+W+' '+H);stage.setAttribute('width',W);stage.setAttribute('height',H);}
function arrowDefs(){const d=el('defs',{});const m=el('marker',{id:'arr',markerWidth:9,markerHeight:9,refX:8,refY:3,orient:'auto'});m.appendChild(el('path',{d:'M0,0 L7,3 L0,6 Z',fill:'#8aa3b2'}));d.appendChild(m);stage.appendChild(d);}
function edgeLine(x1,y1,x2,y2){const dx=x2-x1,dy=y2-y1,L=Math.hypot(dx,dy),ux=dx/L,uy=dy/L,r=24,ox=uy*5,oy=-ux*5;
  stage.appendChild(el('line',{x1:x1+ux*r+ox,y1:y1+uy*r+oy,x2:x2-ux*r+ox,y2:y2-uy*r+oy,stroke:'#8aa3b2','stroke-width':2,'marker-end':'url(#arr)'}));}
function renderGraph(sc,st){setSize(sc.W,sc.H);clear();arrowDefs();
  sc.edges.forEach(([u,v])=>{const U=sc.nodes[u],V=sc.nodes[v];edgeLine(U.x,U.y,V.x,V.y);});
  for(const id in sc.nodes){const nd=sc.nodes[id],f=st.colors[id]||"#cfe3ee",txt=dark(f)?'#fff':'#1f3a4a';
    if(id===st.hi){stage.appendChild(el(nd.owner==='1'?'rect':'circle',
      nd.owner==='1'?{x:nd.x-28,y:nd.y-28,width:56,height:56,rx:8,fill:'none',stroke:'#026573','stroke-width':2.6,'stroke-dasharray':'6 4'}
                    :{cx:nd.x,cy:nd.y,r:28,fill:'none',stroke:'#026573','stroke-width':2.6,'stroke-dasharray':'6 4'}));}
    if(nd.owner==='1'){stage.appendChild(el('rect',{x:nd.x-21,y:nd.y-21,width:42,height:42,rx:6,fill:f,stroke:'#5b7081','stroke-width':1.5}));}
    else{stage.appendChild(el('circle',{cx:nd.x,cy:nd.y,r:21,fill:f,stroke:'#5b7081','stroke-width':1.5}));}
    stage.appendChild(el('text',{x:nd.x,y:nd.y+6,'text-anchor':'middle','font-size':18,'font-weight':700,fill:txt},nd.label));}}
function renderTree(sc,st){setSize(sc.W,sc.H);clear();
  sc.edges.forEach(([u,v])=>{const U=sc.nodes[u],V=sc.nodes[v];stage.appendChild(el('line',{x1:U.x,y1:U.y+24,x2:V.x,y2:V.y-24,stroke:'#aebfca','stroke-width':2}));});
  for(const id in sc.nodes){const nd=sc.nodes[id],f=st.colors[id]||"#cfe3ee",txt=dark(f)?'#fff':'#1f3a4a';
    const lab=(st.labels&&st.labels[id]!=null)?st.labels[id]:(nd.kind==='leaf'?nd.val:'?');
    if(id===st.hi){stage.appendChild(el(nd.kind==='min'?'rect':'circle',
      nd.kind==='min'?{x:nd.x-30,y:nd.y-30,width:60,height:60,rx:8,fill:'none',stroke:'#026573','stroke-width':2.6,'stroke-dasharray':'6 4'}
                     :{cx:nd.x,cy:nd.y,r:30,fill:'none',stroke:'#026573','stroke-width':2.6,'stroke-dasharray':'6 4'}));}
    if(nd.kind==='min'){stage.appendChild(el('rect',{x:nd.x-23,y:nd.y-23,width:46,height:46,rx:6,fill:f,stroke:'#5b7081','stroke-width':1.5}));}
    else{stage.appendChild(el('circle',{cx:nd.x,cy:nd.y,r:23,fill:f,stroke:'#5b7081','stroke-width':1.5}));}
    stage.appendChild(el('text',{x:nd.x,y:nd.y+7,'text-anchor':'middle','font-size':19,'font-weight':700,fill:txt},lab));
    const tag=nd.kind==='max'?'MAX':(nd.kind==='min'?'MIN':'');
    if(tag)stage.appendChild(el('text',{x:nd.x+30,y:nd.y-26,'font-size':11,fill:nd.kind==='max'?'#026573':'#c0392b','font-weight':700},tag));}}
const LEGENDS={graph:'<span><i style="background:#27ae60"></i>cible F</span><span><i style="background:#e67e22"></i>ajouté (cette étape)</span><span><i style="background:#457b9d"></i>dans l\'attracteur</span><span><i style="background:#cfe3ee"></i>hors / en attente</span><span><i style="background:#c0392b"></i>gagnant Joueur 1</span><span>○ V₀ (Joueur 0) &middot; ▢ V₁ (Joueur 1)</span>',
tree:'<span><i style="background:#e67e22"></i>nœud évalué</span><span><i style="background:#457b9d"></i>valeur calculée</span><span><i style="background:#cfe3ee"></i>non évalué</span><span>○ MAX &middot; ▢ MIN</span>'};
function render(){const [si,ti]=flat[gi],sc=SCENES[si],st=sc.steps[ti];document.getElementById('algoSel').value=si;
  document.getElementById('scTitle').textContent=sc.title;document.getElementById('scCount').textContent="Étape "+(ti+1)+" / "+sc.steps.length;
  document.getElementById('legend').innerHTML=LEGENDS[sc.mode];
  if(sc.mode==='tree')renderTree(sc,st);else renderGraph(sc,st);
  document.getElementById('panel').innerHTML=st.p;document.getElementById('cap').innerHTML=st.cap;document.getElementById('pos').textContent=(gi+1)+" / "+flat.length;}
function go(d){gi=Math.max(0,Math.min(flat.length-1,gi+d));render();}
function jumpAlgo(si){gi=sceneStart[si];render();}
const sel=document.getElementById('algoSel');SCENES.forEach((s,si)=>{const o=document.createElement('option');o.value=si;o.textContent=s.name;sel.appendChild(o);});
sel.addEventListener('change',e=>jumpAlgo(+e.target.value));
document.getElementById('bNext').onclick=()=>go(1);document.getElementById('bPrev').onclick=()=>go(-1);
document.getElementById('bAll').onclick=()=>{gi=sceneEnd[flat[gi][0]];render();};
document.getElementById('bReset').onclick=()=>jumpAlgo(flat[gi][0]);
document.getElementById('bNextAlgo').onclick=()=>{const si=flat[gi][0];if(si+1<SCENES.length)jumpAlgo(si+1);};
document.getElementById('bPrevAlgo').onclick=()=>{const si=flat[gi][0];if(si-1>=0)jumpAlgo(si-1);};
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown')go(1);if(e.key==='ArrowLeft'||e.key==='ArrowUp')go(-1);});
render();
</script>
</body></html>
