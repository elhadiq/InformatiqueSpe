<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graphes — Visualisation pas à pas</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--orange:#e67e22;--dark:#2c3e50;--bg:#e8edf2;--border:#dce3ea;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--dark);
  padding:1.2rem 1rem 6rem;display:flex;flex-direction:column;align-items:center;}
.sbs-head{max-width:980px;width:100%;text-align:center;margin-bottom:.6rem;}
.sbs-head h1{font-size:1.5rem;}
.sbs-head .sub{color:#777;font-size:.9rem;margin-top:.2rem;}
.sbs-bar{max-width:980px;width:100%;display:flex;gap:.5rem;align-items:center;justify-content:center;margin:.4rem 0 .8rem;}
.sbs-bar select{padding:.4rem .6rem;border:1px solid var(--border);border-radius:6px;font-size:.9rem;background:#fff;color:var(--dark);}
.sbs-card{background:#fff;max-width:980px;width:100%;border-radius:12px;box-shadow:0 4px 18px rgba(0,0,0,.10);padding:1.1rem 1.4rem 1.4rem;border-top:5px solid var(--orange);}
.sbs-title{font-size:1.15rem;color:var(--orange);font-weight:700;}
.sbs-count{font-size:.82rem;color:#999;margin-bottom:.5rem;}
.sbs-grid{display:grid;grid-template-columns:1.55fr 1fr;gap:1rem;align-items:start;}
@media(max-width:760px){.sbs-grid{grid-template-columns:1fr;}}
#stage{width:100%;height:auto;background:#fbfdff;border:1px solid #eef2f6;border-radius:8px;}
.sbs-panel{background:#f4f9fc;border:1px solid var(--border);border-radius:8px;padding:.6rem .7rem;font-size:.84rem;}
.prow{display:flex;gap:.4rem;padding:.18rem 0;border-bottom:1px dashed #e3eaf0;}
.prow:last-child{border-bottom:none;}
.plab{font-weight:700;color:#2a6fb3;min-width:92px;}
.pval{font-family:'Consolas','Fira Code',monospace;color:#1f4e7a;word-break:break-word;}
.sbs-cap{margin-top:.7rem;background:#fff7e0;border-left:4px solid #e0b341;border-radius:6px;padding:.55rem .8rem;font-size:.92rem;color:#6e4b0a;min-height:2.4rem;}
.sbs-ctrl{position:fixed;bottom:0;left:0;right:0;background:#ffffffee;border-top:1px solid var(--border);backdrop-filter:blur(4px);
  display:flex;gap:.6rem;align-items:center;justify-content:center;padding:.7rem;z-index:50;}
.sbs-ctrl button{background:var(--orange);color:#fff;border:none;border-radius:8px;padding:.55rem 1.1rem;font-weight:700;cursor:pointer;}
.sbs-ctrl button.ghost{background:#fff;color:var(--dark);border:1px solid var(--border);}
.sbs-ctrl .pos{font-size:.85rem;color:#666;min-width:120px;text-align:center;}
</style>
</head>

<div class="sbs-ctrl">
