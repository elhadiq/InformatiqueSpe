<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visualisation IA : K-means & KNN</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--teal:#026573;--dark:#2c3e50;--bg:#eef1f5;--border:#dce3ea;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--dark);padding:1.2rem 1.4rem 6rem;}
.wrap{max-width:1500px;margin:0 auto;}
.sbs-head{text-align:center;margin-bottom:.5rem;} .sbs-head h1{font-size:1.5rem;color:var(--teal);} .sbs-head .sub{color:#777;font-size:.9rem;margin-top:.2rem;}
.sbs-bar{display:flex;gap:.5rem;align-items:center;justify-content:center;margin:.4rem 0 .9rem;}
.sbs-bar select{padding:.45rem .7rem;border:1px solid var(--border);border-radius:6px;font-size:1rem;background:#fff;color:var(--dark);font-weight:600;}
.sbs-title{font-size:1.25rem;color:var(--teal);font-weight:700;} .sbs-count{font-size:.85rem;color:#999;margin:.1rem 0 .5rem;}
#stagewrap{width:100%;overflow:auto;border:1px solid #e2e9ef;border-radius:10px;background:#fbfdff;box-shadow:inset 0 0 0 1px #fff,0 2px 10px rgba(0,0,0,.05);max-height:72vh;text-align:center;}
#stage{display:block;margin:0 auto;}
.legend{display:flex;flex-wrap:wrap;gap:.6rem;margin:.7rem 0;font-size:.78rem;color:#555;}
.legend span{display:inline-flex;align-items:center;gap:.3rem;} .legend i{width:15px;height:15px;border-radius:3px;display:inline-block;border:1px solid #bbb;}
.sbs-cap{background:#e4f1f2;border-left:5px solid var(--teal);border-radius:6px;padding:.65rem .9rem;font-size:1rem;color:#0a3a40;min-height:2.4rem;}
.sbs-panel{margin-top:.7rem;background:#f4f9fc;border:1px solid var(--border);border-radius:8px;padding:.7rem .9rem;font-size:.92rem;}
.prow{display:flex;gap:.5rem;padding:.2rem 0;border-bottom:1px dashed #e3eaf0;} .prow:last-child{border-bottom:none;}
.plab{font-weight:700;color:var(--teal);min-width:120px;} .pval{font-family:'Consolas','Fira Code',monospace;color:#1f4e7a;word-break:break-word;}
.sbs-ctrl{position:fixed;bottom:0;left:0;right:0;background:#ffffffee;border-top:1px solid var(--border);backdrop-filter:blur(4px);display:flex;gap:.6rem;align-items:center;justify-content:center;padding:.7rem;z-index:50;}
.sbs-ctrl button{background:var(--teal);color:#fff;border:none;border-radius:8px;padding:.55rem 1.1rem;font-weight:700;cursor:pointer;}
.sbs-ctrl button.ghost{background:#fff;color:var(--dark);border:1px solid var(--border);} .sbs-ctrl .pos{font-size:.85rem;color:#666;min-width:120px;text-align:center;}
</style></head><body><div class="wrap">
<div class="sbs-head"><h1>Visualisation IA : K-means & KNN</h1>
<p style="text-align:center;color:inherit;opacity:.92;font-weight:600;font-size:0.95em;margin:6px 0 14px;">Pr. EL HADIQ Zouhair</p><p class="sub">Suivant &#9654; / &#8594; construit l'exécution &middot; <strong>Tout l'arbre</strong> affiche l'arbre entier &middot; zone défilable.</p></div>
<div class="sbs-bar"><label style="font-size:.9rem;color:#555;">Algorithme :</label><select id="algoSel"></select></div>
<div class="sbs-title" id="scTitle"></div><div class="sbs-count" id="scCount"></div>
<div id="stagewrap"><svg id="stage" xmlns="http://www.w3.org/2000/svg"></svg></div>
<div class="legend">
  <span><i style="background:#457b9d"></i>cluster 0 / classe A</span><span><i style="background:#e67e22"></i>cluster 1 / classe B</span>
  <span><i style="background:#e9c46a"></i>k plus proches voisins</span><span><i style="background:#cfe3ee"></i>non affecté</span></div>
<div class="sbs-cap" id="cap"></div><div class="sbs-panel" id="panel"></div></div>
<div class="sbs-ctrl">
  <button class="ghost" id="bPrevAlgo">&#9198;</button><button class="ghost" id="bPrev">&#9664; Précédent</button>
  <button id="bNext">Suivant &#9654;</button><button class="ghost" id="bAll">&#10530; Tout l'arbre</button>
  <button class="ghost" id="bReset">&#8635; Début</button><button class="ghost" id="bNextAlgo">&#9197;</button>
  <span class="pos" id="pos"></span></div>
<script>
const SCENES=[{"name": "K-means (convergence)", "title": "K-means : affectation ↔ recalcul des centres", "mode": "array", "steps": [{"a": [1, 2, 4, 9, 11, 12], "colors": ["#cfe3ee", "#cfe3ee", "#cfe3ee", "#cfe3ee", "#cfe3ee", "#cfe3ee"], "ptr": {}, "region": null, "p": "<div class='prow'><span class='plab'>points</span><span class='pval'>[1, 2, 4, 9, 11, 12]</span></div><div class='prow'><span class='plab'>centre c0</span><span class='pval'>1.0</span></div><div class='prow'><span class='plab'>centre c1</span><span class='pval'>2.0</span></div>", "cap": "Initialisation : 2 centres c0=1 et c1=2 (mauvais choix volontaire)."}, {"a": [1, 2, 4, 9, 11, 12], "colors": ["#457b9d", "#e67e22", "#e67e22", "#e67e22", "#e67e22", "#e67e22"], "ptr": {}, "region": null, "p": "<div class='prow'><span class='plab'>points</span><span class='pval'>[1, 2, 4, 9, 11, 12]</span></div><div class='prow'><span class='plab'>centre c0</span><span class='pval'>1.0</span></div><div class='prow'><span class='plab'>centre c1</span><span class='pval'>2.0</span></div><div class='prow'><span class='plab'>affectation</span><span class='pval'>[0, 1, 1, 1, 1, 1]</span></div>", "cap": "Itération 1 — Affectation : chaque point rejoint le centre le plus proche."}, {"a": [1, 2, 4, 9, 11, 12], "colors": ["#457b9d", "#e67e22", "#e67e22", "#e67e22", "#e67e22", "#e67e22"], "ptr": {}, "region": null, "p": "<div class='prow'><span class='plab'>points</span><span class='pval'>[1, 2, 4, 9, 11, 12]</span></div><div class='prow'><span class='plab'>centre c0</span><span class='pval'>1.0</span></div><div class='prow'><span class='plab'>centre c1</span><span class='pval'>7.6</span></div><div class='prow'><span class='plab'>affectation</span><span class='pval'>[0, 1, 1, 1, 1, 1]</span></div>", "cap": "Itération 1 — Mise à jour : c0=1.0, c1=7.6 (moyenne de chaque groupe)."}, {"a": [1, 2, 4, 9, 11, 12], "colors": ["#457b9d", "#457b9d", "#457b9d", "#e67e22", "#e67e22", "#e67e22"], "ptr": {}, "region": null, "p": "<div class='prow'><span class='plab'>points</span><span class='pval'>[1, 2, 4, 9, 11, 12]</span></div><div class='prow'><span class='plab'>centre c0</span><span class='pval'>1.0</span></div><div class='prow'><span class='plab'>centre c1</span><span class='pval'>7.6</span></div><div class='prow'><span class='plab'>affectation</span><span class='pval'>[0, 0, 0, 1, 1, 1]</span></div>", "cap": "Itération 2 — Affectation : chaque point rejoint le centre le plus proche."}, {"a": [1, 2, 4, 9, 11, 12], "colors": ["#457b9d", "#457b9d", "#457b9d", "#e67e22", "#e67e22", "#e67e22"], "ptr": {}, "region": null, "p": "<div class='prow'><span class='plab'>points</span><span class='pval'>[1, 2, 4, 9, 11, 12]</span></div><div class='prow'><span class='plab'>centre c0</span><span class='pval'>2.33</span></div><div class='prow'><span class='plab'>centre c1</span><span class='pval'>10.67</span></div><div class='prow'><span class='plab'>affectation</span><span class='pval'>[0, 0, 0, 1, 1, 1]</span></div>", "cap": "Itération 2 — Mise à jour : c0=2.33, c1=10.67 (moyenne de chaque groupe)."}, {"a": [1, 2, 4, 9, 11, 12], "colors": ["#457b9d", "#457b9d", "#457b9d", "#e67e22", "#e67e22", "#e67e22"], "ptr": {}, "region": null, "p": "<div class='prow'><span class='plab'>points</span><span class='pval'>[1, 2, 4, 9, 11, 12]</span></div><div class='prow'><span class='plab'>centre c0</span><span class='pval'>2.33</span></div><div class='prow'><span class='plab'>centre c1</span><span class='pval'>10.67</span></div><div class='prow'><span class='plab'>affectation</span><span class='pval'>[0, 0, 0, 1, 1, 1]</span></div>", "cap": "Itération 3 — Affectation : chaque point rejoint le centre le plus proche."}, {"a": [1, 2, 4, 9, 11, 12], "colors": ["#457b9d", "#457b9d", "#457b9d", "#e67e22", "#e67e22", "#e67e22"], "ptr": {}, "region": null, "p": "<div class='prow'><span class='plab'>points</span><span class='pval'>[1, 2, 4, 9, 11, 12]</span></div><div class='prow'><span class='plab'>centre c0</span><span class='pval'>2.33</span></div><div class='prow'><span class='plab'>centre c1</span><span class='pval'>10.67</span></div><div class='prow'><span class='plab'>affectation</span><span class='pval'>[0, 0, 0, 1, 1, 1]</span></div>", "cap": "Itération 3 — Mise à jour : c0=2.33, c1=10.67 (moyenne de chaque groupe)."}, {"a": [1, 2, 4, 9, 11, 12], "colors": ["#457b9d", "#457b9d", "#457b9d", "#e67e22", "#e67e22", "#e67e22"], "ptr": {}, "region": null, "p": "<div class='prow'><span class='plab'>points</span><span class='pval'>[1, 2, 4, 9, 11, 12]</span></div><div class='prow'><span class='plab'>centre c0</span><span class='pval'>2.33</span></div><div class='prow'><span class='plab'>centre c1</span><span class='pval'>10.67</span></div><div class='prow'><span class='plab'>affectation</span><span class='pval'>[0, 0, 0, 1, 1, 1]</span></div>", "cap": "Stabilisation : les centres ne bougent plus → convergence vers un minimum local."}]}, {"name": "KNN (classification)", "title": "KNN : vote des k plus proches voisins", "mode": "array", "steps": [{"a": [1, 2, 3, 6, 7, 8], "colors": ["#457b9d", "#457b9d", "#457b9d", "#e67e22", "#e67e22", "#e67e22"], "ptr": {}, "region": null, "p": "<div class='prow'><span class='plab'>points</span><span class='pval'>[1, 2, 3, 6, 7, 8]</span></div><div class='prow'><span class='plab'>classes</span><span class='pval'>['A', 'A', 'A', 'B', 'B', 'B']</span></div><div class='prow'><span class='plab'>requête x</span><span class='pval'>4</span></div>", "cap": "Jeu étiqueté (A=bleu, B=orange). On veut classer le point x=4 avec k=3."}, {"a": [1, 2, 3, 6, 7, 8], "colors": ["#457b9d", "#457b9d", "#457b9d", "#e67e22", "#e67e22", "#e67e22"], "ptr": {}, "region": null, "p": "<div class='prow'><span class='plab'>distances</span><span class='pval'>[3, 2, 1, 2, 3, 4]</span></div><div class='prow'><span class='plab'>requête x</span><span class='pval'>4</span></div>", "cap": "Calcul des distances euclidiennes de x à chaque point."}, {"a": [1, 2, 3, 6, 7, 8], "colors": ["#cfe3ee", "#e9c46a", "#e9c46a", "#e9c46a", "#cfe3ee", "#cfe3ee"], "ptr": {}, "region": null, "p": "<div class='prow'><span class='plab'>k voisins (idx)</span><span class='pval'>[2, 1, 3]</span></div><div class='prow'><span class='plab'>leurs classes</span><span class='pval'>['A', 'A', 'B']</span></div>", "cap": "Sélection des k=3 plus proches voisins (en jaune) : indices [2, 1, 3]."}, {"a": [1, 2, 3, 6, 7, 8], "colors": ["#cfe3ee", "#e9c46a", "#e9c46a", "#e9c46a", "#cfe3ee", "#cfe3ee"], "ptr": {}, "region": null, "p": "<div class='prow'><span class='plab'>votes</span><span class='pval'>{'A': 2, 'B': 1}</span></div><div class='prow'><span class='plab'>classe prédite</span><span class='pval'>A</span></div>", "cap": "Vote majoritaire : {'A': 2, 'B': 1} → classe prédite = A."}]}];const NS="http://www.w3.org/2000/svg";
let flat=[];SCENES.forEach((s,si)=>s.steps.forEach((_,ti)=>flat.push([si,ti])));
let sceneStart={},sceneEnd={};flat.forEach(([si],g)=>{if(sceneStart[si]===undefined)sceneStart[si]=g;sceneEnd[si]=g;});
let gi=0;const stage=document.getElementById('stage');
function dark(h){const c=h.replace('#','');const r=parseInt(c.substr(0,2),16),g=parseInt(c.substr(2,2),16),b=parseInt(c.substr(4,2),16);return (0.299*r+0.587*g+0.114*b)<140;}
function el(t,a,x){const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);if(x!=null)e.textContent=x;return e;}
function clear(){while(stage.firstChild)stage.removeChild(stage.firstChild);}
function setSize(W,H){stage.setAttribute('viewBox','0 0 '+W+' '+H);stage.setAttribute('width',W);stage.setAttribute('height',H);}
const TBW=46,TBH=38,TPITCH=54;
function tboxes(v,cx,cy,col){if(v.length===0){stage.appendChild(el('rect',{x:cx-16,y:cy-TBH/2,width:32,height:TBH,rx:6,fill:'#eef3f6',stroke:'#c4d2dc','stroke-width':1,'stroke-dasharray':'3 3'}));stage.appendChild(el('text',{x:cx,y:cy+5,'text-anchor':'middle','font-size':16,fill:'#9aa7b2'},'∅'));return;}
  const w=v.length*TPITCH,left=cx-w/2;for(let k=0;k<v.length;k++){const x=left+k*TPITCH+(TPITCH-TBW)/2,y=cy-TBH/2,f=col(k);
  stage.appendChild(el('rect',{x:x,y:y,width:TBW,height:TBH,rx:7,fill:f,stroke:'#9bb6c4','stroke-width':1.2}));
  stage.appendChild(el('text',{x:x+TBW/2,y:y+TBH/2+7,'text-anchor':'middle','font-size':21,'font-weight':700,fill:dark(f)?'#fff':'#1f3a4a'},v[k]));}}
function renderTree(sc,st){setSize(sc.W,sc.H);clear();const vis=new Set(st.vis);
  sc.edges.forEach(([p,c])=>{if(vis.has(p)&&vis.has(c)){const P=sc.layout[p],C=sc.layout[c];stage.appendChild(el('line',{x1:P.x,y1:P.y+TBH/2,x2:C.x,y2:C.y-TBH/2,stroke:'#aebfca','stroke-width':2}));}});
  st.vis.forEach(id=>{const nd=sc.layout[id],s=st.st[id];if(!s)return;
    if(id===st.hi){const w=Math.max(s.v.length,1)*TPITCH;stage.appendChild(el('rect',{x:nd.x-w/2-6,y:nd.y-TBH/2-6,width:w+12,height:TBH+12,rx:9,fill:'none',stroke:'#026573','stroke-width':2.4,'stroke-dasharray':'6 4'}));}
    tboxes(s.v,nd.x,nd.y,k=>(s.pivot!=null&&k===s.pivot)?'#e67e22':s.c);});}
function renderArray(sc,st){const a=st.a,n=a.length,box=60,gap=14,padX=30,topPad=56,botPad=34;const W=padX*2+n*box+(n-1)*gap,H=topPad+box+botPad;setSize(W,H);clear();
  if(st.region){const lo=st.region[0],hi=st.region[1],x=padX+lo*(box+gap)-5,w=(hi-lo+1)*box+(hi-lo)*gap+10;stage.appendChild(el('rect',{x:x,y:topPad-6,width:w,height:box+12,rx:8,fill:'none',stroke:'#026573','stroke-width':2,'stroke-dasharray':'5 4'}));}
  for(let k=0;k<n;k++){const x=padX+k*(box+gap),y=topPad,f=st.colors[k]||"#cfe3ee";stage.appendChild(el('rect',{x:x,y:y,width:box,height:box,rx:8,fill:f,stroke:'#9bb6c4','stroke-width':1.2}));
    stage.appendChild(el('text',{x:x+box/2,y:y+box/2+8,'text-anchor':'middle','font-size':24,'font-weight':700,fill:dark(f)?'#fff':'#1f3a4a'},a[k]));
    stage.appendChild(el('text',{x:x+box/2,y:y+box+19,'text-anchor':'middle','font-size':13,fill:'#9aa7b2'},k));}
  const by={};for(const lab in st.ptr){const i=st.ptr[lab];(by[i]=by[i]||[]).push(lab);}
  for(const i in by){const x=padX+i*(box+gap)+box/2;stage.appendChild(el('text',{x:x,y:topPad-15,'text-anchor':'middle','font-size':15,'font-weight':700,fill:'#e67e22'},by[i].join(',')));stage.appendChild(el('text',{x:x,y:topPad-2,'text-anchor':'middle','font-size':14,fill:'#e67e22'},'▼'));}}
function render(){const [si,ti]=flat[gi],sc=SCENES[si],st=sc.steps[ti];document.getElementById('algoSel').value=si;
  document.getElementById('scTitle').textContent=sc.title;document.getElementById('scCount').textContent="Étape "+(ti+1)+" / "+sc.steps.length;
  if(sc.mode==='tree')renderTree(sc,st);else renderArray(sc,st);
  document.getElementById('panel').innerHTML=st.p;document.getElementById('cap').innerHTML=st.cap;document.getElementById('pos').textContent=(gi+1)+" / "+flat.length;}
function go(d){gi=Math.max(0,Math.min(flat.length-1,gi+d));render();}
function jumpAlgo(si){gi=sceneStart[si];render();}
const sel=document.getElementById('algoSel');SCENES.forEach((s,si)=>{const o=document.createElement('option');o.value=si;o.textContent=s.name;sel.appendChild(o);});
sel.addEventListener('change',e=>jumpAlgo(+e.target.value));
document.getElementById('bNext').onclick=()=>go(1);document.getElementById('bPrev').onclick=()=>go(-1);
document.getElementById('bAll').onclick=()=>{gi=sceneEnd[flat[gi][0]];render();};
document.getElementById('bReset').onclick=()=>jumpAlgo(flat[gi][0]);
document.getElementById('bNextAlgo').onclick=()=>{const si=flat[gi][0];if(si+1<SCENES.length)jumpAlgo(si+1);};
document.getElementById('bPrevAlgo').onclick=()=>{const si=flat[gi][0];if(si-1>=0)jumpAlgo(si-1);};
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown')go(1);if(e.key==='ArrowLeft'||e.key==='ArrowUp')go(-1);});
render();
</script>
</body></html>
